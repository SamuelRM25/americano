services:
  # The PHP Website service
  - type: web
    name: student-portal
    env: docker
    plan: free # Can be changed to 'starter' or higher for better performance
    region: oregon # Closest to Clever Cloud or user preference
    dockerFilePath: ./Dockerfile
    healthCheckPath: /index.php
    envVars:
      - key: DB_HOST
        fromService:
          name: portal-db
          type: pserv
          property: host
      - key: DB_USER
        value: admin
      - key: DB_PASSWORD
        fromService:
          name: portal-db
          type: pserv
          property: MYSQL_PASSWORD
      - key: DB_NAME
        value: student_portal
      - key: DB_PORT
        value: "3306"

  # MySQL Database running as a Private Service
  - type: pserv
    name: portal-db
    runtime: docker
    image: mysql:8.0
    plan: free
    region: oregon # Must be the same as the web service
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: student_portal
      - key: MYSQL_USER
        value: admin
      - key: MYSQL_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
