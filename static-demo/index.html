<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Login - Sistema Escolar Americano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8',
                            500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e',
                        },
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bg-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden relative bg-pattern">
    <div
        class="absolute top-0 -left-4 w-72 h-72 bg-primary-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob">
    </div>
    <div
        class="absolute top-0 -right-4 w-72 h-72 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000">
    </div>
    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center relative z-10">
        <div class="hidden lg:block space-y-8 animate-in slide-in-from-left duration-1000">
            <h1 class="text-7xl font-black text-white leading-[1.1] tracking-tight">Tu futuro <br> <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-primary-400 to-primary-600">comienza
                    aquí.</span></h1>
            <p class="text-slate-400 text-xl max-w-lg font-medium">Demo estática para GitHub Pages. La funcionalidad
                completa requiere hosting PHP.</p>
        </div>
        <div class="flex justify-center lg:justify-end">
            <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] space-y-10 animate-in zoom-in duration-700">
                <div class="text-center">
                    <div
                        class="bg-gradient-to-br from-primary-500 to-primary-700 w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-8 animate-float">
                        <i data-lucide="graduation-cap" class="w-12 h-12 text-white"></i>
                    </div>
                    <h2 class="text-4xl font-black text-white tracking-tight">Login Demo</h2>
                    <p class="text-slate-400 mt-3 font-medium">Escribe cualquier código para entrar (demo)</p>
                </div>
                <form action="dashboard.html" class="space-y-8">
                    <input type="text"
                        class="w-full pl-5 pr-5 py-5 input-glass rounded-2xl text-white text-lg font-bold"
                        placeholder="Eje: DEMO-2026">
                    <button type="submit"
                        class="w-full bg-white text-slate-900 font-black py-5 rounded-2xl hover:bg-primary-50 transition-all text-lg">ENTRAR
                        A LA DEMO</button>
                </form>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
